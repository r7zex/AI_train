name: Scoped topic 4.1 update

on:
  push:
    branches:
      - agent/block4-topic-4-1-concise-data-target

permissions:
  contents: write

jobs:
  update-topic:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply scoped source changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          ROOT = Path('.')

          def replace_once(path: str, old: str, new: str) -> None:
              file = ROOT / path
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one exact match, found {count}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          def regex_once(path: str, pattern: str, replacement: str) -> None:
              file = ROOT / path
              text = file.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one regex match, found {count}: {pattern}')
              file.write_text(updated, encoding='utf-8')

          data_target = '''import type { FlowTopic } from '../../aiCurriculumTypes'
          import { callout, code, makeStdinTask, mlFoundationsTopic, practiceStep, quizStep, section, singleQuiz, theoryStep } from '../helpers'

          export const topicMlDataTarget: FlowTopic = mlFoundationsTopic(
            'ml-foundations-data-target',
            '4.1 Данные, признаки и целевая переменная',
            1,
            'Разбираем на одной таблице, какие столбцы образуют признаки X, какой столбец является целевой переменной y и какие данные нельзя использовать.',
            'Из копии таблицы целевую переменную извлекают через pop, а в X оставляют только сведения, доступные на дату прогноза.',
            ['объект', 'наблюдение', 'dataset', 'feature', 'target', 'X', 'y', 'leakage'],
            ['X = таблица признаков', 'y = целевая переменная'],
            ['В X входят только сведения, доступные в момент реального прогноза.'],
            [
              theoryStep(
                'ml-foundations-data-target-object',
                'Таблица и роли столбцов',
                'На одной таблице выбираем столбцы для прогноза и столбец с правильным ответом.',
                [
                  section('synthetic-client-table', 'Таблица для прогноза оттока', [
                    'По значениям на дату решения нужно предсказать, уйдёт ли клиент в следующие 30 дней. Каждая строка относится к одному клиенту на эту дату.',
                  ], {
                    table: {
                      headers: [
                        '`client_id` — клиент',
                        '`household_group` — группа',
                        '`days_since_login` — дней без входа',
                        '`tariff` — тариф',
                        '`support_tickets` — обращения',
                        '`churn_after_30d` — отток',
                      ],
                      rows: [
                        ['C101', 'H1', '2', 'pro', '0', 'нет'],
                        ['C102', 'H1', '18', 'basic', '2', 'да'],
                        ['C103', 'H2', '5', 'pro', '1', 'нет'],
                        ['C104', 'H2', '31', 'basic', '4', 'да'],
                        ['C105', 'H3', '9', 'basic', '0', 'нет'],
                        ['C106', 'H3', '24', 'pro', '3', 'да'],
                      ],
                    },
                    callouts: [
                      callout(
                        'Что использовать',
                        '`days_since_login`, `tariff` и `support_tickets` — признаки. `churn_after_30d` — целевая переменная. `client_id` и `household_group` нужны для учёта записей и не входят в X.',
                        'important',
                      ),
                    ],
                  }),
                ],
              ),
              theoryStep(
                'ml-foundations-data-target-x-y',
                'Разделить таблицу на X и y',
                'Целевой столбец извлекаем через pop, не перечисляя признаки вручную.',
                [
                  section('split-same-rows', 'Извлечь целевую переменную через pop', [
                    'Сначала исключаем идентификатор и групповой столбец. Затем `pop` возвращает `churn_after_30d` и одновременно удаляет его из таблицы. Оставшиеся столбцы образуют X.',
                    '`pop` не меняет порядок строк, поэтому каждому клиенту в X соответствует ответ с той же позиции в y.',
                  ], {
                    codeExamples: [
                      code('python', `
                        import pandas as pd

                        df = pd.DataFrame({
                            "client_id": ["C101", "C102", "C103", "C104", "C105", "C106"],
                            "household_group": ["H1", "H1", "H2", "H2", "H3", "H3"],
                            "days_since_login": [2, 18, 5, 31, 9, 24],
                            "tariff": ["pro", "basic", "pro", "basic", "basic", "pro"],
                            "support_tickets": [0, 2, 1, 4, 0, 3],
                            "churn_after_30d": ["нет", "да", "нет", "да", "нет", "да"],
                        })

                        data = df.drop(columns=["client_id", "household_group"]).copy()
                        y = data.pop("churn_after_30d")
                        X = data

                        print(X.columns.tolist())
                        print(y.tolist())
                        print("X:", X.shape, "y:", y.shape)
                      `, `
                        ['days_since_login', 'tariff', 'support_tickets']
                        ['нет', 'да', 'нет', 'да', 'нет', 'да']
                        X: (6, 3) y: (6,)
                      `, '`pop` вернул целевую переменную, а в X остались три признака и те же шесть строк.'),
                    ],
                  }),
                  section('categorical-values', 'Тариф пока остаётся строкой', [
                    '`tariff` остаётся со значениями `basic` и `pro`. Преобразование категорий в числа разбирается позже, в теме 4.16.',
                  ]),
                ],
              ),
              theoryStep(
                'ml-foundations-data-target-leakage',
                'Проверить признаки перед обучением',
                'В X оставляют только сведения, которые реально известны на дату прогноза.',
                [
                  section('cutoff-timeline', 'Не брать ответ и сведения из будущего', [
                    'На дату прогноза известны `days_since_login`, `tariff` и обращения, зарегистрированные к этой дате. `churn_after_30d` и дата последующего закрытия аккаунта станут известны позже.',
                    'Если добавить такой будущий столбец в X, возникнет утечка данных: при реальном использовании модель не получит эту информацию.',
                  ], {
                    callouts: [
                      callout(
                        'Короткая проверка X',
                        'Целевая переменная удалена; идентификатор и групповой столбец исключены; каждый оставшийся признак доступен на дату прогноза.',
                        'remember',
                      ),
                    ],
                  }),
                ],
              ),
              quizStep(
                'ml-foundations-data-target-quiz',
                'Определить целевую переменную',
                'Проверяем, какой столбец хранит ответ задачи.',
                singleQuiz(
                  'quiz-ml-foundations-data-target',
                  'Признаки и целевая переменная',
                  'ml-foundations-data-target',
                  'ml-foundations',
                  'Для клиента C106 нужно предсказать отток в следующие 30 дней. Какой столбец должен быть y?',
                  [
                    { id: 'a', text: '`days_since_login`' },
                    { id: 'b', text: '`tariff`' },
                    { id: 'c', text: '`support_tickets`' },
                    { id: 'd', text: '`churn_after_30d`' },
                  ],
                  'd',
                  '`y` хранит ответ задачи — произошёл ли отток в следующие 30 дней.',
                ),
              ),
              practiceStep(
                'ml-foundations-data-target-practice',
                'Отделить признаки от служебных столбцов и цели',
                'По ролям столбцов выводим только признаки.',
                makeStdinTask(
                  'task-ml-foundations-split-x-y',
                  'Оставить только признаки',
                  'Первая строка содержит названия столбцов, вторая — целевой столбец. Необязательные третья и четвёртая строки содержат идентификаторы и групповые столбцы. Выведите только признаки в исходном порядке.',
                  `
                    import sys

                    lines = sys.stdin.read().splitlines()
                    # TODO: соберите множество столбцов, которые нужно исключить.

                    # TODO: выведите оставшиеся столбцы в исходном порядке.
                  `,
                  [
                    { id: 's1', description: 'Квартиры (сохранённый сценарий)', input: 'area rooms district price\nprice', expectedOutput: 'area rooms district' },
                    { id: 's2', description: 'Клиенты', input: 'client_id household_group days_since_login tariff support_tickets churn_after_30d\nchurn_after_30d\nclient_id\nhousehold_group', expectedOutput: 'days_since_login tariff support_tickets' },
                  ],
                  [
                    { id: 'h1', description: 'Клиенты (сохранённый сценарий)', input: 'age purchases churn\nchurn', expectedOutput: 'age purchases' },
                    { id: 'h2', description: 'Цель в середине (сохранённый сценарий)', input: 'text is_spam sender\nis_spam', expectedOutput: 'text sender' },
                    { id: 'h3', description: 'Несколько идентификаторов', input: 'row_id patient_id clinic age marker outcome\noutcome\nrow_id patient_id\nclinic', expectedOutput: 'age marker' },
                  ],
                  `
                    import sys

                    lines = sys.stdin.read().splitlines()
                    columns = lines[0].split()
                    excluded = {lines[1].strip()}
                    if len(lines) > 2:
                        excluded.update(lines[2].split())
                    if len(lines) > 3:
                        excluded.update(lines[3].split())
                    features = [column for column in columns if column not in excluded]
                    print(" ".join(features))
                  `,
                ),
              ),
            ],
          )
          '''
          # The heredoc is indented by YAML; remove the common ten-space prefix.
          data_target = '\n'.join(line[10:] if line.startswith('          ') else line for line in data_target.splitlines()) + '\n'
          (ROOT / 'src/data/curriculum/ml_foundations/data_target.ts').write_text(data_target, encoding='utf-8')

          regex_once(
              'src/data/courseVisuals.ts',
              r"  'ml-foundations-data-target': \[.*?\n  \],\n(?=  'ml-foundations-model-fit-predict': \[)",
              '',
          )

          replace_once(
              'scripts/generate-course-visuals.py',
              '    ("ml-foundations-data-target", "Признаки X и целевая переменная y"),\n',
              '',
          )
          replace_once(
              'scripts/generate-course-visuals.py',
              '    "ml-foundations-data-target", "ml-foundations-model-fit-predict",\n',
              '    "ml-foundations-model-fit-predict",\n',
          )
          regex_once(
              'scripts/generate-course-visuals.py',
              r'\ndef data_target_visual\(topic_id: str, title: str, suffix: str = ""\):.*?\n\ndef model_fit_predict_visual',
              '\n\ndef model_fit_predict_visual',
          )
          replace_once(
              'scripts/generate-course-visuals.py',
              '    if topic_id == "ml-foundations-data-target":\n        data_target_visual(topic_id, title)\n    elif topic_id == "ml-foundations-model-fit-predict":\n',
              '    if topic_id == "ml-foundations-model-fit-predict":\n',
          )
          replace_once(
              'scripts/generate-course-visuals.py',
              '        if topic_id == "ml-foundations-data-target": data_target_visual(topic_id,title,"-2")\n        elif topic_id == "ml-foundations-model-fit-predict": model_fit_predict_visual(topic_id,title,"-2")\n',
              '        if topic_id == "ml-foundations-model-fit-predict": model_fit_predict_visual(topic_id,title,"-2")\n',
          )
          replace_once(
              'scripts/generate-course-visuals.py',
              '        OUT / "ml-foundations-data-target.png",\n        OUT / "ml-foundations-data-target-2.png",\n',
              '',
          )

          replace_once(
              'scripts/audit-curriculum.mjs',
              'requireCondition(courseVisualFiles.length === 103, `Expected exactly 103 course PNG files, got ${courseVisualFiles.length}.`)',
              'requireCondition(courseVisualFiles.length === 101, `Expected exactly 101 course PNG files, got ${courseVisualFiles.length}.`)',
          )

          new_course_test = r'''test('topics 4.1 and 4.2 keep one dataset while topic 4.1 stays concise', async ({ page }) => {
            await page.setViewportSize({ width: 1440, height: 900 })
            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-object')
            await expect(page.getByRole('heading', { name: 'Таблица для прогноза оттока' })).toBeVisible()
            await expect(page.getByText('C101', { exact: true })).toBeVisible()
            await expect(page.getByText('C106', { exact: true })).toBeVisible()
            await expect(page.getByRole('heading', { name: 'Роль каждого столбца' })).toHaveCount(0)
            await expect(page.getByText(/явно синтетический набор данных/)).toHaveCount(0)
            await expect(page.getByRole('figure')).toHaveCount(0)
            await page.screenshot({ path: '/tmp/ai-train-topic-4-1-desktop.png', fullPage: true })

            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-x-y')
            await expect(page.getByRole('heading', { name: 'Извлечь целевую переменную через pop' })).toBeVisible()
            await expect(page.locator('pre').filter({ hasText: 'y = data.pop("churn_after_30d")' })).toBeVisible()
            await expect(page.locator('pre').filter({ hasText: 'feature_cols =' })).toHaveCount(0)
            await expect(page.getByText('X: (6, 3) y: (6,)', { exact: false })).toBeVisible()
            await expect(page.getByText(/Тариф пока остаётся строкой/)).toBeVisible()
            await expect(page.getByText(/теме 4\.16/)).toBeVisible()

            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-leakage')
            await expect(page.getByRole('heading', { name: 'Не брать ответ и сведения из будущего' })).toBeVisible()
            await expect(page.getByText(/Если добавить такой будущий столбец в X, возникнет утечка данных/)).toBeVisible()
            await expect(page.getByRole('heading', { name: 'Четыре разных источника утечки' })).toHaveCount(0)
            await expect(page.getByRole('figure')).toHaveCount(0)

            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-quiz')
            await expect(page.getByText(/Для клиента C106 нужно предсказать отток/)).toBeVisible()

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-model')
            await expect(page.getByRole('heading', { name: 'Вычислительное правило для прогноза' })).toBeVisible()
            await expect(page.getByText(/До fit: алгоритм \+ настройки/)).toBeVisible()
            await expect(page.getByText('estimator до fit', { exact: true })).toBeVisible()
            await expect(page.getByText('model после fit', { exact: true })).toBeVisible()
            const stateFigure = page.getByRole('figure')
            await expect(stateFigure.locator('img')).toHaveAttribute('src', '/course-visuals/ml-foundations-model-fit-predict-2.png')
            await expect(stateFigure.locator('figcaption')).toContainText('гиперпараметр задан заранее')

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-fit')
            await expect(page.getByText(/оценивание параметров, правил или сводных значений/)).toBeVisible()
            await expect(page.getByText('most-frequent dummy', { exact: true })).toBeVisible()
            await expect(page.getByText(/Подробно.*теме 4\.15/)).toBeVisible()

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-predict')
            await expect(page.getByText(/X_new\.shape = \(1, 3\)/)).toBeVisible()
            await expect(page.getByText(/y_pred\.shape = \(1,\)/)).toBeVisible()
            await expect(page.locator('pre').filter({ hasText: "['нет']" })).toBeVisible()
            await expect(page.getByText('классификация, predict_proba', { exact: true })).toBeVisible()

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-compare')
            await expect(page.getByText(/Путь обучения \(training path\)/)).toBeVisible()
            await expect(page.getByText(/Путь применения \(inference path\)/)).toBeVisible()
            await expect(page.getByText(/те же признаки, в том же порядке, в тех же единицах/)).toBeVisible()
            const pathsFigure = page.getByRole('figure')
            await expect(pathsFigure.locator('img')).toHaveAttribute('src', '/course-visuals/ml-foundations-model-fit-predict.png')
            await expect(pathsFigure.locator('figcaption')).toContainText('y не входит в predict')

            await page.setViewportSize({ width: 390, height: 844 })
            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-x-y')
            await expect(page.locator('.stepik-sidebar')).toBeHidden()
            await expect(page.getByRole('heading', { name: 'Извлечь целевую переменную через pop' })).toBeVisible()
            expect(await page.evaluate(() => document.documentElement.scrollWidth <= window.innerWidth)).toBe(true)
            await page.screenshot({ path: '/tmp/ai-train-topic-4-1-mobile.png', fullPage: true })

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-compare')
            await expect(page.getByRole('figure').locator('figcaption')).toBeVisible()
            expect(await page.evaluate(() => document.documentElement.scrollWidth <= window.innerWidth)).toBe(true)
          })'''
          regex_once(
              'tests/e2e/course.spec.ts',
              r"test\('topics 4\.1 and 4\.2 keep one dataset across theory, code, quiz, and scoped visuals'.*?\n\}\)\n\n(?=test\('core ML theory)",
              new_course_test + '\n\n',
          )

          consistency = '''import { expect, test } from '@playwright/test'

          test('step 02 keeps topic 4.1 concise and class order consistent in topic 4.2', async ({ page }) => {
            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-object')
            await expect(page.getByRole('heading', { name: 'Роль каждого столбца' })).toHaveCount(0)
            await expect(page.getByRole('figure')).toHaveCount(0)

            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-x-y')
            await expect(page.locator('pre').filter({ hasText: 'y = data.pop("churn_after_30d")' })).toBeVisible()
            await expect(page.locator('pre').filter({ hasText: 'feature_cols =' })).toHaveCount(0)

            await page.goto('/topics/ml-foundations-data-target/ml-foundations-data-target-leakage')
            await expect(page.getByRole('heading', { name: 'Четыре разных источника утечки' })).toHaveCount(0)
            await expect(page.getByText(/строки связанной группы H1 попали и в train, и в test/)).toHaveCount(0)

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-model')
            await expect(page.getByText(/classes_ = \[да, нет\].*\[2\/5, 3\/5\]/)).toBeVisible()
            await expect(page.getByText(/classes_ = \[нет, да\]/)).toHaveCount(0)

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-fit')
            await expect(page.getByText(/classes_ = \[да, нет\].*class_prior_ = \[2\/5, 3\/5\]/)).toBeVisible()

            await page.goto('/topics/ml-foundations-model-fit-predict/ml-foundations-model-fit-predict-predict')
            await expect(page.getByText(/не является test-оценкой качества модели/)).toBeVisible()
            await expect(page.getByText('Не путать с проверкой', { exact: true })).toBeVisible()
            await expect(page.getByText(/C105 и C106 относятся к одной группе H3/)).toBeVisible()
            await expect(page.getByText(/нельзя использовать как независимый test-объект/)).toBeVisible()
            await expect(page.locator('pre').filter({ hasText: "['да' 'нет'] [0.4 0.6]" })).toBeVisible()
          })
          '''
          consistency = '\n'.join(line[10:] if line.startswith('          ') else line for line in consistency.splitlines()) + '\n'
          (ROOT / 'tests/e2e/block4-step02-consistency.spec.ts').write_text(consistency, encoding='utf-8')

          source_test = '''from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]


          def test_topic_4_1_uses_pop_and_drops_repeated_theory() -> None:
              source = (ROOT / "src/data/curriculum/ml_foundations/data_target.ts").read_text(encoding="utf-8")
              assert 'y = data.pop("churn_after_30d")' in source
              assert "feature_cols =" not in source
              assert "Роль каждого столбца" not in source
              assert "Проверить каждый кандидат в признаки" not in source
              assert "Четыре разных источника утечки" not in source
              assert "явно синтетический набор данных" not in source
              assert source.count("theoryStep(") == 3
              assert source.count("quizStep(") == 1
              assert source.count("practiceStep(") == 1


          def test_topic_4_1_visuals_are_removed_without_weakening_registry_checks() -> None:
              registry = (ROOT / "src/data/courseVisuals.ts").read_text(encoding="utf-8")
              generator = (ROOT / "scripts/generate-course-visuals.py").read_text(encoding="utf-8")
              audit = (ROOT / "scripts/audit-curriculum.mjs").read_text(encoding="utf-8")
              assert "'ml-foundations-data-target': [" not in registry
              assert 'ml-foundations-data-target.png' not in generator
              assert 'ml-foundations-data-target-2.png' not in generator
              assert "Expected exactly 101 course PNG files" in audit
              assert "Course PNG files missing from registry" in audit
              assert not (ROOT / "public/course-visuals/ml-foundations-data-target.png").exists()
              assert not (ROOT / "public/course-visuals/ml-foundations-data-target-2.png").exists()
          '''
          source_test = '\n'.join(line[10:] if line.startswith('          ') else line for line in source_test.splitlines()) + '\n'
          (ROOT / 'tests/test_block4_topic_4_1_simplification.py').write_text(source_test, encoding='utf-8')

          for name in [
              'public/course-visuals/ml-foundations-data-target.png',
              'public/course-visuals/ml-foundations-data-target-2.png',
          ]:
              (ROOT / name).unlink()

          # Fail early if old content remains anywhere in the scoped source/tests.
          scoped_text = '\n'.join(
              (ROOT / path).read_text(encoding='utf-8')
              for path in [
