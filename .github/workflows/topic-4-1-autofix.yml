              'public/course-visuals/ml-foundations-data-target.png',
              'public/course-visuals/ml-foundations-data-target-2.png',
          }
          changed = set(subprocess.check_output(['git', 'diff', '--name-only', 'HEAD'], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f'Files outside scope: {sorted(unexpected)}')
          print('Scoped files:', *sorted(changed), sep='\n- ')
