name: Clean topic 4.1 PR artifact

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/block4-topic-4-1-concise-data-target'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/block4-topic-4-1-concise-data-target
          fetch-depth: 0

      - name: Refresh main
        run: git fetch origin main

      - name: Remove generated bytecode and cleanup workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test "$(git ls-files 'tests/__pycache__/*.pyc' | wc -l)" -eq 1
          git rm tests/__pycache__/test_block4_topic_4_1_simplification.cpython-311-pytest-9.1.1.pyc
          git rm .github/workflows/topic-4-1-cleanup.yml
          git commit -m "chore: remove generated pytest cache artifact"

      - name: Correct final report inventory
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/block4-work/topic-4-1-concise-data-target.md')
          text = path.read_text(encoding='utf-8')
          row = '| `tests/__pycache__/test_block4_topic_4_1_simplification.cpython-311-pytest-9.1.1.pyc` | binary | binary |\n'
          if text.count(row) != 1:
              raise RuntimeError(f'Expected one bytecode inventory row, found {text.count(row)}')
          text = text.replace(row, '', 1)
          text = text.replace(
              '- PR остаётся draft до независимой проверки artifact и фактического GitHub diff.\n',
              '- Сгенерированный pytest bytecode удалён отдельным cleanup-коммитом и отсутствует в итоговом PR diff.\n- PR остаётся draft до независимой проверки artifact и фактического GitHub diff.\n',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          git add docs/block4-work/topic-4-1-concise-data-target.md
          git diff --cached --name-only | grep -qx 'docs/block4-work/topic-4-1-concise-data-target.md'
          git commit -m "docs: correct topic 4.1 final inventory"
          git push origin HEAD
