name: Capture topic 4.1 audit diagnostics

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  audit-debug:
    if: github.head_ref == 'agent/block4-topic-4-1-concise-data-target'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/block4-topic-4-1-concise-data-target
          fetch-depth: 0

      - name: Refresh main
        run: git fetch origin main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply the same scoped source patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path('.github/workflows/topic-4-1-autofix.yml').read_text(encoding='utf-8').splitlines()
          marker = '- name: Apply scoped source changes'
          start = next(i for i, line in enumerate(lines) if line.strip() == marker)
          run_index = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'run: |')
          run_indent = len(lines[run_index]) - len(lines[run_index].lstrip())
          block = []
          for line in lines[run_index + 1:]:
              indent = len(line) - len(line.lstrip()) if line.strip() else run_indent + 2
              if line.strip() and indent <= run_indent:
                  break
              block.append(line[run_indent + 2:] if len(line) >= run_indent + 2 else '')
          script = '\n'.join(block).rstrip() + '\n'
          script = script.replace(", 'Четыре разных источника утечки'", '')
          Path('/tmp/apply.sh').write_text(script, encoding='utf-8')
          PY
          bash /tmp/apply.sh

      - name: Add strict table-only audit invariant
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/audit-curriculum.mjs')
          text = path.read_text(encoding='utf-8')
          old = "  requireCondition(topicVisuals.length >= 1, `${topic.id}: expected at least one PNG illustration.`)\n  requireCondition(topicVisuals.length <= 3, `${topic.id}: expected no more than three PNG illustrations, got ${topicVisuals.length}.`)"
          new = """  if (topic.id === 'ml-foundations-data-target') {
            const structuredTables = topic.steps
              .flatMap((step) => step.sections ?? [])
              .map((section) => section.table)
              .filter(Boolean)
            const mainTable = structuredTables[0]
            requireCondition(topicVisuals.length === 0, `${topic.id}: concise table-only design must not register PNG illustrations.`)
            requireCondition(structuredTables.length === 1, `${topic.id}: expected exactly one structured data table.`)
            requireCondition(mainTable?.headers?.length === 6, `${topic.id}: structured data table must contain six columns.`)
            requireCondition(mainTable?.rows?.length === 6, `${topic.id}: structured data table must contain six rows.`)
          } else {
            requireCondition(topicVisuals.length >= 1, `${topic.id}: expected at least one PNG illustration.`)
          }
          requireCondition(topicVisuals.length <= 3, `${topic.id}: expected no more than three PNG illustrations, got ${topicVisuals.length}.`)"""
          if text.count(old) != 1:
              raise RuntimeError(f'Expected one audit invariant, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Install locked Node dependencies
        run: npm ci

      - name: Capture audit output
        id: audit
        continue-on-error: true
        shell: bash
        run: npm run audit:curriculum > /tmp/topic-4-1-audit.log 2>&1

      - name: Upload audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topic-4-1-audit-diagnostics
          path: /tmp/topic-4-1-audit.log
          if-no-files-found: error

      - name: Propagate audit failure
        if: steps.audit.outcome == 'failure'
        run: exit 1
