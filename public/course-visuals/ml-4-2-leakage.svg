   <g id="text_1">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="47.9808" y="53.84715" transform="rotate(-0 47.9808 53.84715)">Момент прогноза и утечка данных</text>
   </g>
   <g id="text_2">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5d6b78" x="47.9808" y="74.094281" transform="rotate(-0 47.9808 74.094281)">Допустим только тот признак, который существовал к моменту решения.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #138a57" x="128.3328" y="267.928838" transform="rotate(-0 128.3328 267.928838)">регистрация</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #0b70e0" x="305.1072" y="267.928838" transform="rotate(-0 305.1072 267.928838)">данные сегодня</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #7657e8" x="441.7056" y="267.928838" transform="rotate(-0 441.7056 267.928838)">ПРОГНОЗ</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ce3b36" x="626.5152" y="267.928838" transform="rotate(-0 626.5152 267.928838)">исход</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #138a57" x="96.192" y="138.959081" transform="rotate(-0 96.192 138.959081)">МОЖНО В X</text>
   </g>
   <g id="text_8">
    <text style="font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="96.192" y="158.483325" transform="rotate(-0 96.192 158.483325)">Возраст, тариф, обращения — если они уже</text>
   </g>
   <g id="text_9">
    <text style="font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="96.192" y="174.525806" transform="rotate(-0 96.192 174.525806)">известны в момент решения.</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #ce3b36" x="489.9168" y="138.959081" transform="rotate(-0 489.9168 138.959081)">НЕЛЬЗЯ В X</text>
   </g>
   <g id="text_11">
    <text style="font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="489.9168" y="158.309606" transform="rotate(-0 489.9168 158.309606)">Финальный статус, дата закрытия, сумма</text>
   </g>
   <g id="text_12">
    <text style="font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="489.9168" y="174.525806" transform="rotate(-0 489.9168 174.525806)">возврата — они появляются после прогноза.</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="156.456" y="341.232203" transform="rotate(-0 156.456 341.232203)">ПРЯМАЯ УТЕЧКА</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="80.1216" y="378.459881" transform="rotate(-0 80.1216 378.459881)">Признак прямо или почти прямо содержит</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="80.1216" y="394.676081" transform="rotate(-0 80.1216 394.676081)">ответ.</text>
   </g>
   <g id="text_16">
    <text style="font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5d6b78" x="80.1216" y="427.76635" transform="rotate(-0 80.1216 427.76635)">Пример: сумма возврата → «будет возврат?»</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="546.1632" y="341.232203" transform="rotate(-0 546.1632 341.232203)">ВРЕМЕННАЯ УТЕЧКА</text>
   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="457.776" y="378.459881" transform="rotate(-0 457.776 378.459881)">Признак появился позже момента прогноза.</text>
   </g>
   <g id="text_19">
    <text style="font-size: 10px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5d6b78" x="457.776" y="427.596038" transform="rotate(-0 457.776 427.596038)">Пример: финальный статус заказа → «отменят?»</text>
   </g>
   <g id="text_20">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ce3b36" x="417.6" y="489.3828" transform="rotate(-0 417.6 489.3828)">Высокая метрика с будущими данными — не успех модели.</text>
   </g>
  </g>
