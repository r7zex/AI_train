    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="47.9808" y="53.84715" transform="rotate(-0 47.9808 53.84715)">Скалярное произведение: из двух списков получается одно число</text>
