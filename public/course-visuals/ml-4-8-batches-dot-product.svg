    <text style="font-weight: 700; font-size: 10.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #0758b4" x="200.6496" y="178.495959" transform="rotate(-0 200.6496 178.495959)">ПРИЗНАКИ</text>
