<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Линейная и нелинейная структура данных</title>
  <desc id="desc">Слева точки с высокой линейной корреляцией и прямой. Справа точки образуют кольцо, хотя линейная корреляция близка к нулю.</desc>
  <defs>
    <style>
      .title { font: 700 38px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a66; }
      .panel-title { font: 700 25px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a66; }
      .axis-label { font: 700 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a66; }
      .tick { font: 500 15px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #244493; }
      .legend { font: 600 16px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #102a66; }
      .note { font: 700 21px system-ui, -apple-system, "Segoe UI", sans-serif; fill: white; }
      .grid { stroke: #c9daf7; stroke-width: 1.4; }
      .axis { stroke: #244493; stroke-width: 2; }
      .point { fill: #244493; stroke: white; stroke-width: 2.2; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#102a66" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="#ffffff"/>
  <text x="700" y="56" text-anchor="middle" class="title">Линейная и нелинейная структура данных</text>

  <!-- Left panel -->
  <g filter="url(#shadow)">
    <rect x="55" y="92" width="620" height="565" rx="18" fill="#edf4ff"/>
  </g>
  <text x="365" y="132" text-anchor="middle" class="panel-title">Сильная линейная связь</text>

  <!-- Left grid -->
  <g>
    <line x1="125" y1="175" x2="125" y2="585" class="grid"/>
    <line x1="215" y1="175" x2="215" y2="585" class="grid"/>
    <line x1="305" y1="175" x2="305" y2="585" class="grid"/>
    <line x1="395" y1="175" x2="395" y2="585" class="grid"/>
    <line x1="485" y1="175" x2="485" y2="585" class="grid"/>
    <line x1="575" y1="175" x2="575" y2="585" class="grid"/>
    <line x1="95" y1="205" x2="635" y2="205" class="grid"/>
    <line x1="95" y1="285" x2="635" y2="285" class="grid"/>
    <line x1="95" y1="365" x2="635" y2="365" class="grid"/>
    <line x1="95" y1="445" x2="635" y2="445" class="grid"/>
    <line x1="95" y1="525" x2="635" y2="525" class="grid"/>
  </g>
  <line x1="95" y1="585" x2="635" y2="585" class="axis"/>
  <line x1="95" y1="175" x2="95" y2="585" class="axis"/>
  <text x="365" y="627" text-anchor="middle" class="axis-label">Признак x</text>
  <text x="32" y="380" text-anchor="middle" class="axis-label" transform="rotate(-90 32 380)">Целевая величина y</text>
  <text x="125" y="607" text-anchor="middle" class="tick">1</text>
  <text x="215" y="607" text-anchor="middle" class="tick">3</text>
  <text x="305" y="607" text-anchor="middle" class="tick">5</text>
  <text x="395" y="607" text-anchor="middle" class="tick">7</text>
  <text x="485" y="607" text-anchor="middle" class="tick">9</text>
  <text x="78" y="530" text-anchor="end" class="tick">2</text>
  <text x="78" y="450" text-anchor="end" class="tick">4</text>
  <text x="78" y="370" text-anchor="end" class="tick">6</text>
  <text x="78" y="290" text-anchor="end" class="tick">8</text>

  <line x1="118" y1="555" x2="615" y2="190" stroke="#244493" stroke-width="5" stroke-linecap="round"/>
  <circle cx="125" cy="548" r="8" class="point"/>
  <circle cx="180" cy="498" r="8" class="point"/>
  <circle cx="235" cy="510" r="8" class="point"/>
  <circle cx="290" cy="408" r="8" class="point"/>
  <circle cx="345" cy="430" r="8" class="point"/>
  <circle cx="400" cy="315" r="8" class="point"/>
  <circle cx="455" cy="342" r="8" class="point"/>
  <circle cx="520" cy="215" r="8" class="point"/>
  <circle cx="590" cy="252" r="8" class="point"/>

  <g>
    <rect x="112" y="476" width="300" height="94" rx="9" fill="#ffffff" stroke="#b8cdf3" stroke-width="1.5"/>
    <circle cx="135" cy="498" r="7" fill="#244493"/>
    <text x="155" y="504" class="legend">наблюдения</text>
    <line x1="128" y1="526" x2="151" y2="526" stroke="#244493" stroke-width="4"/>
    <text x="160" y="532" class="legend">линейная модель</text>
    <text x="128" y="558" class="legend">коэффициент корреляции: r = 0,96</text>
  </g>

  <!-- Right panel -->
  <g filter="url(#shadow)">
    <rect x="725" y="92" width="620" height="565" rx="18" fill="#edf4ff"/>
  </g>
  <text x="1035" y="132" text-anchor="middle" class="panel-title">Кольцевая нелинейная структура</text>

  <!-- Right grid -->
  <g>
    <line x1="795" y1="175" x2="795" y2="585" class="grid"/>
    <line x1="885" y1="175" x2="885" y2="585" class="grid"/>
    <line x1="975" y1="175" x2="975" y2="585" class="grid"/>
    <line x1="1065" y1="175" x2="1065" y2="585" class="grid"/>
    <line x1="1155" y1="175" x2="1155" y2="585" class="grid"/>
    <line x1="1245" y1="175" x2="1245" y2="585" class="grid"/>
    <line x1="765" y1="205" x2="1305" y2="205" class="grid"/>
    <line x1="765" y1="285" x2="1305" y2="285" class="grid"/>
    <line x1="765" y1="365" x2="1305" y2="365" class="grid"/>
    <line x1="765" y1="445" x2="1305" y2="445" class="grid"/>
    <line x1="765" y1="525" x2="1305" y2="525" class="grid"/>
  </g>
  <line x1="765" y1="585" x2="1305" y2="585" class="axis"/>
  <line x1="765" y1="175" x2="765" y2="585" class="axis"/>
  <text x="1035" y="627" text-anchor="middle" class="axis-label">Признак x</text>
  <text x="702" y="380" text-anchor="middle" class="axis-label" transform="rotate(-90 702 380)">Целевая величина y</text>
  <text x="795" y="607" text-anchor="middle" class="tick">1</text>
  <text x="885" y="607" text-anchor="middle" class="tick">3</text>
  <text x="975" y="607" text-anchor="middle" class="tick">5</text>
  <text x="1065" y="607" text-anchor="middle" class="tick">7</text>
  <text x="1155" y="607" text-anchor="middle" class="tick">9</text>
  <text x="748" y="530" text-anchor="end" class="tick">2</text>
  <text x="748" y="450" text-anchor="end" class="tick">4</text>
  <text x="748" y="370" text-anchor="end" class="tick">6</text>
  <text x="748" y="290" text-anchor="end" class="tick">8</text>

  <!-- Symmetric ring: covariance and Pearson correlation are approximately zero -->
  <g>
    <circle cx="1245" cy="375" r="8" class="point"/>
    <circle cx="1238" cy="331" r="8" class="point"/>
    <circle cx="1219" cy="290" r="8" class="point"/>
    <circle cx="1188" cy="255" r="8" class="point"/>
    <circle cx="1148" cy="228" r="8" class="point"/>
    <circle cx="1102" cy="211" r="8" class="point"/>
    <circle cx="1053" cy="205" r="8" class="point"/>
    <circle cx="1004" cy="211" r="8" class="point"/>
    <circle cx="958" cy="228" r="8" class="point"/>
    <circle cx="918" cy="255" r="8" class="point"/>
    <circle cx="887" cy="290" r="8" class="point"/>
    <circle cx="868" cy="331" r="8" class="point"/>
    <circle cx="861" cy="375" r="8" class="point"/>
    <circle cx="868" cy="419" r="8" class="point"/>
    <circle cx="887" cy="460" r="8" class="point"/>
    <circle cx="918" cy="495" r="8" class="point"/>
    <circle cx="958" cy="522" r="8" class="point"/>
    <circle cx="1004" cy="539" r="8" class="point"/>
    <circle cx="1053" cy="545" r="8" class="point"/>
    <circle cx="1102" cy="539" r="8" class="point"/>
    <circle cx="1148" cy="522" r="8" class="point"/>
    <circle cx="1188" cy="495" r="8" class="point"/>
    <circle cx="1219" cy="460" r="8" class="point"/>
    <circle cx="1238" cy="419" r="8" class="point"/>
  </g>

  <g>
    <rect x="782" y="490" width="330" height="78" rx="9" fill="#ffffff" stroke="#b8cdf3" stroke-width="1.5"/>
    <circle cx="807" cy="514" r="7" fill="#244493"/>
    <text x="827" y="520" class="legend">наблюдения</text>
    <text x="798" y="552" class="legend">коэффициент корреляции: r ≈ 0,00</text>
  </g>

  <rect x="215" y="694" width="970" height="91" rx="13" fill="#244493"/>
  <text x="700" y="730" text-anchor="middle" class="note">Корреляция и прямая не описывают форму кольца.</text>
  <text x="700" y="762" text-anchor="middle" class="note">Для такой зависимости нужны нелинейные методы машинного обучения.</text>
</svg>
