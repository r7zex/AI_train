   </g>
   <g id="text_18">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ce3b36" x="417.6" y="464.802769" transform="rotate(-0 417.6 464.802769)">СВЯЗЬ ≠ ПРИЧИННОСТЬ</text>
   </g>
   <g id="text_19">
    <text style="font-size: 9.7px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ce3b36" x="417.6" y="487.243284" transform="rotate(-0 417.6 487.243284)">Ни коэффициент, ни permutation importance, ни SHAP не доказывают причинный эффект.</text>
