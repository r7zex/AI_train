   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="417.6" y="161.606603" transform="rotate(-0 417.6 161.606603)">PERMUTATION</text>
   </g>
   <g id="text_9">
