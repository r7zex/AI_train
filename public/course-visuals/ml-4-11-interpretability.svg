   <g id="text_16">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #ce3b36" x="594.3744" y="316.913025" transform="rotate(-0 594.3744 316.913025)">ОГРАНИЧЕНИЕ</text>
   </g>
   <g id="text_17">
