   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="337.248" y="224.421806" transform="rotate(-0 337.248 224.421806)">после перемешивания?</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 8.8px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #ce3b36" x="337.248" y="316.913025" transform="rotate(-0 337.248 316.913025)">ОГРАНИЧЕНИЕ</text>
   </g>
   <g id="text_12">
