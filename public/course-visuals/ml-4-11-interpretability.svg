   <g id="text_1">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #182431" x="47.9808" y="53.84715" transform="rotate(-0 47.9808 53.84715)">Три инструмента интерпретации — три разных вопроса</text>
   </g>
   <g id="text_2">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5d6b78" x="47.9808" y="74.094281" transform="rotate(-0 47.9808 74.094281)">Важность описывает модель и данные, а не причинный эффект.</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 10.2px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="160.4736" y="161.606603" transform="rotate(-0 160.4736 161.606603)">КОЭФФИЦИЕНТ</text>
   </g>
   <g id="text_4">
